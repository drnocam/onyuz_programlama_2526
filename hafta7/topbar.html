    <style>
        body {
            font-family: 'Calibri', 'Times New Roman', monospace;
        }
        topbar {
            background-color: lightgray;
            height: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            align-items: center;
            padding: 0 10px;
        }
        topbar > div {
            display: flex;
            gap: 10px;
            color:rgb(30,30,30);
            font-size: 90%; 
            align-items: center;
        }
        topbar .arama {
            background-color: rgba(0,0,0,0.05);
            padding:3px;
            border:1px solid rgba(0,0,0,0.1);
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap:5px;
            color:rgb(119, 119, 119);
        }
        topbar .arama > input {
            background-color: transparent;
            border:none; 
        }
        topbar > div:nth-last-child(1) {
            justify-content: flex-end;
        }
        topbar > div:nth-last-child(1) > svg {
            width: 13px;
            height: 13px;
        }
    </style>
</head>
